<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת ניהול פנימייה Pro Max — גרסה 5.3</title>
  
  <!-- ספריות חיצוניות -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-alpine.css" />

  <!-- קובץ עיצוב -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- (כאן נשאר כל ה-HTML של ה-body כמו בקובץ המקורי, ללא שינוי במבנה ה-DOM) -->
<!-- ... העתק את כל ה-div class="app" וה-div class="modal-backdrop" מהקובץ המקורי ... -->
<div class="app">
    <!-- ... תוכן האפליקציה ... -->
    <aside class="sidebar">
       <!-- ... -->
    </aside>
    <main class="app-content">
       <!-- ... -->
       <section id="pane-manage" class="main">
          <!-- ... -->
       </section>
       <section id="pane-students" class="hidden">
           <div class="card students" style="padding: 12px;">
               <div class="toolbar">
                <input id="search-student" class="search" placeholder="חפש בחור לפי שם, ת.ז, כיתה או ישוב…" /> <button class="btn primary" id="btn-add-student">הוסף בחור חדש</button>
                <button class="btn secondary" id="btn-import-students">ייבוא CSV</button>
                <button class="btn" id="btn-edit-student" disabled>ערוך</button>
                <button class="btn secondary" id = "btn-export-students-csv">ייצוא CSV</button>
                <button class="btn danger" id="btn-del-student" disabled>מחק</button>
               </div>
               <input type="file" id="csv-file-input" accept=".csv" class="hidden" />
               <input type="file" id="json-file-input" accept="application/json" class="hidden" />
               <div id="myGrid" class="ag-theme-alpine" style="height: 100%; width: 100%; border-radius: 10px; overflow: hidden; border: 1px solid var(--border);"></div>
           </div>
       </section>
    </main>
</div>

<div class="modal-backdrop hidden" id="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h4 id="modal-title">כותרת</h4>
      <div id="modal-body"></div>
      <div class="row-inline" style="justify-content: flex-start; margin-top: 10px;">
        <button class="btn primary" id="modal-ok">אישור</button>
        <button class="btn" id="modal-cancel">ביטול</button>
      </div>
    </div>
</div>

<!-- טעינת הסקריפטים בסדר לוגי -->
<script src="js/01-utils.js"></script>
<script src="js/02-data-manager.js"></script>
<script src="js/03-io.js"></script>
<script src="js/04-ui-core.js"></script>
<script src="js/05-ui-tree.js"></script>
<script src="js/06-ui-actions.js"></script>
<script src="js/07-ui-prompts.js"></script>
<script src="js/08-ui-students.js"></script>
<script src="js/99-main.js"></script>

</body>
</html>
