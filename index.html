     * @param {HTMLElement} elem - האלמנט שנלחץ
     */
    function selectNode(type, id, elem) {
      // נקה בחירות קודמות
      els('.tree-item').forEach(n => n.classList.remove('selected'));
      els('.bed-cell').forEach(n => n.classList.remove('selected-bed'));
      
      // הגדר בחירה חדשה
      selectedNode = { type, id: Number(id) };

      if (type !== 'bed') {
          elem.classList.add('selected'); // סמן פריט עץ
      } else {
          elem.classList.add('selected-bed'); // סמן תא מיטה
          // סמן גם את החדר האב של המיטה
          const parentRoom = elem.closest('.tree-node-wrapper[data-type="r"]');
          if (parentRoom) {
              const roomItem = parentRoom.querySelector('.tree-item');
              if(roomItem) roomItem.classList.add('selected');
          }
      }
      
      updateActionsPanel(); // עדכן את פאנל הפעולות
    }
    
    // ==================================================
    //       פרק 9: לוגיקת ממשק - פאנל פעולות (צד שמאל)
    // ==================================================
    
    /**
     * יוצר אינדיקטור סטטוס ויזואלי.
     * @param {string} text - הטקסט להצגה (כותרת)
     * @param {string} cls - המחלקה (לצביעה)
     * @param {string} [title=''] - טקסט ל-tooltip
     * @returns {HTMLElement}
     */
    function createStatusCard(text, cls, title = '') {
        const span = document.createElement('span');
        span.className = `status-card ${cls}`;
        span.textContent = text;
        if (title) span.title = title;
        return span;
    }

    /**
     * הוספה: מרנדר את רשימת היסטוריית השיבוצים עבור מיטה.
     * @param {object} bed - אובייקט המיטה
     * @param {HTMLElement} container - האלמנט להכניס לתוכו את הרשימה
     */
    function renderBedHistory(bed, container) {
        container.innerHTML = '<h4>היסטוריית שיבוצים</h4>';
        
        // אתחול למקרה שאין היסטוריה (מיגרציה)
        if (!bed.history || bed.history.length === 0) {
            container.innerHTML += '<p class="muted">אין היסטוריית שיבוצים למיטה זו.</p>';
            return;
        }

        const list = document.createElement('ul');
        
        // הצג מהאחרון לראשון
        bed.history.slice().reverse().forEach(entry => {
            const li = document.createElement('li');
            
            // חדש: יצירת אלמנט שם הבחור שיהיה ניתן ללחיצה
            const nameContainer = document.createElement('div');
            nameContainer.style.display = 'flex';
            nameContainer.style.alignItems = 'center';
            nameContainer.style.gap = '8px';
            
            const studentId = entry.studentId;
            const student = findStudent(studentId);
            
            // אלמנט השם (יהפוך לקישור אם יש מיקום)
            const nameEl = document.createElement('strong');
            nameEl.textContent = escapeHtml(entry.studentName);
            
            let statusIndicator = null; // ברירת מחדל: null (כדי לא לנסות להוסיף)
            
            // --- בדיקת סטטוס נוכחי ---
            if (student) {
                const currentBedLocation = getStudentBed(studentId);
                const isMaoras = student.tags && student.tags.includes('מאורס');
                const isHizuk = student.tags && student.tags.includes('חיזוק');

                if (currentBedLocation) {
                    // סטטוס: משובץ כרגע
                    const locationText = `${currentBedLocation.room.room_number}, מ' ${currentBedLocation.bed.bed_number}`;
                    
                    statusIndicator = createStatusCard(`🏠 משובץ: ${locationText}`, 'status-active', 'משובץ כעת במיטה זו');
                    
                    // הפיכת השם לקישור שיעבור למיטה הנוכחית
                    nameEl.style.fontWeight = 'bold';
                    nameEl.style.cursor = 'pointer';
                    nameEl.onclick = (e) => {
                         e.stopPropagation();
                         switchTab('manage'); // ודא שאנחנו במסך הניהול
                         selectedNode = { type: 'bed', id: currentBedLocation.bed.id }; // הגדר את המיטה הנוכחית כנבחרת
                         refreshAll(currentBedLocation.bed.id); // <-- שינוי: הוספת bed.id לטובת גלילה
                    };
                } else if (isMaoras || isHizuk) {
                    // סטטוס: לא משובץ, אבל יש לו תגית מיוחדת
                    if (isMaoras) {
                        // שינוי: שימוש ב-toHebrewDate
                        const date = student.status_data.wedding_date ? ` (${toHebrewDate(student.status_data.wedding_date)})` : '';
                         statusIndicator = createStatusCard(`${'💍 מאורס' + date}`, 'status-maoras', 'הבחור מאורס ומיועד לעזוב');
                    } else if (isHizuk) {
                        // שינוי: שימוש ב-toHebrewDate
                        const date = student.status_data.return_date ? ` (חוזר: ${toHebrewDate(student.status_data.return_date)})` : '';
                        statusIndicator = createStatusCard(`${'↩️ חיזוק' + date}`, 'status-hizuk', 'הבחור נמצא בחיזוק ומיועד לחזור');
                    } else {
                         statusIndicator = createStatusCard(`⚠️ פנוי (סטטוס מיוחד)`, 'status-unassigned');
                    }
                } else {
                    // סטטוס: פנוי
                    statusIndicator = createStatusCard(`❌ פנוי כרגע`, 'status-unassigned', 'לא משובץ כרגע באף מיטה');
                }
            } else {
                 // סטטוס: נמחק מהרשימה
                 statusIndicator = createStatusCard(`(הבחור נמחק)`, 'muted');
            }
            
            // הרכבת האלמנט
            nameContainer.appendChild(nameEl);
            
            if (statusIndicator) { // אם נוצר כרטיס סטטוס (כלומר לא מחרוזת טקסט)
                nameContainer.appendChild(statusIndicator);
            }
            
            // הוסף את המזהה (ת.ז/דרכון) כטקסט משני
            const idSpan = document.createElement('span');
            idSpan.className = 'muted';
            idSpan.style.fontWeight = 'normal';
            idSpan.textContent = `(${studentId})`;
            nameContainer.appendChild(idSpan);
            
            li.appendChild(nameContainer);


            // --- הצגת תאריכי שיבוץ/ביטול ---
            let dateText = document.createElement('small');
            dateText.style.textAlign = 'left';

            // שינוי: שימוש ב-formatDate (שמכיל תאריך עברי)
            let assignedText = `משובץ: ${formatDate(entry.dateAssigned)}`;
            
            if (entry.status === 'assigned') {
                assignedText += ' - <span style="color:var(--success)">עדיין כאן</span>';
            } else {
                let actionText = ''; // נשתמש במשתנה זה כדי להכיל את התוכן של הסטטוס ביטול/מעבר
                let actionClass = '';
                
                if (entry.status === 'student_deleted') {
                    actionText = `נמחק: ${formatDate(entry.dateUnassigned)}`;
                    actionClass = 'status-deleted';
                }
                else if (entry.status === 'moved' && entry.movedToBedId) {
                    const loc = findBed(entry.movedToBedId);
                    const destinationText = loc 
                        ? `חדר ${loc.room.room_number}, מיטה ${loc.bed.bed_number}` 
                        : 'מיטה אחרת (ID: ' + entry.movedToBedId + ')';
                    
                    // NEW: Create a clickable link inside the HTML string
                    actionText = `
                        עבר ל
                        <span class="bed-history-link" data-bed-id="${entry.movedToBedId}" style="color:var(--accent-2); text-decoration:underline; cursor:pointer;" title="לחץ למעבר למיטה">
                            ${destinationText}
                        </span>
                        ב- ${formatDate(entry.dateUnassigned)}`;
                    actionClass = 'status-moved';
                }
                else { // entry.status === 'unassigned'
                    actionText = `עזב: ${formatDate(entry.dateUnassigned)}`;
                    actionClass = 'status-moved'; // נשתמש ב-status-moved רק כדי לצבוע בצבע אזהרה
                }

                assignedText += ` | <span class="${actionClass}">${actionText}</span>`;
            }
            
            dateText.innerHTML = assignedText;
            li.appendChild(dateText);
            list.appendChild(li);
        });

        container.appendChild(list);
        
		// NEW: Add event listeners for the 'moved' links
        container.querySelectorAll('.bed-history-link[data-bed-id]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.stopPropagation();
                const bedId = Number(e.target.dataset.bedId);

                el('#search-rooms').value = ''; // <-- *** הוסף את השורה הזו ***
                
                // Switch to manage tab, set selection, and refresh (with scroll)
                switchTab('manage');
                selectedNode = { type: 'bed', id: bedId };
                refreshAll(bedId); // Pass the bedId for immediate scroll
            });
        });
    }


    /**
     * *** שינוי: הפונקציה עודכנה לקבל ID לגלילה ***
     * מעדכן את פאנל הפעולות (צד שמאל) בהתאם לפריט שנבחר בעץ (selectedNode).
     */
    function updateActionsPanel() {
      const title = el('#actions-title');
      const details = el('#actions-details');
      const btns = el('#actions-buttons');
      const btnDelete = el('#btn-delete');
      
      // הוספה: נקה את פאנל ההיסטוריה
      const historyContainer = el('#bed-history');
      historyContainer.innerHTML = '';
      historyContainer.classList.add('hidden');


      btns.innerHTML = ''; // נקה כפתורים קודמים
      btnDelete.disabled = true; // כברירת מחדל, כפתור המחיקה מנוטרל

      // אם שום דבר לא נבחר
      if (!selectedNode || selectedNode.type === 'dummy') {
        title.textContent = 'בחר פריט מהעץ';
        details.textContent = '—';
        return;
      }

      const { type, id } = selectedNode;
      btnDelete.disabled = false; // אפשר מחיקה

      // ---- הצג כותרת, פרטים וכפתורים לפי סוג הפריט ----
      
      if (type === 'b') { // נבחר מבנה
        const b = findBuilding(id);
        title.textContent = `נבחר: ${b.name}`;
        details.textContent = `סוג: מבנה`;
        btns.appendChild(primaryBtn('הוסף קומה', ()=> promptAddFloor(b.id)));
        btns.appendChild(btn('ערוך שם מבנה', 'warn', ()=> promptEditBuilding(b.id, b.name)));
      } 
      
      else if (type === 'f') { // נבחרה קומה
        const { building, floor } = findFloor(id);
        const displayName = floor.displayName || `קומה ${floor.floor_number}`;
        title.textContent = `נבחר: ${displayName}`;
        details.textContent = `סוג: קומה (${building.name})`;
        btns.appendChild(primaryBtn('הוסף חדר בודד', ()=> promptAddRoom(floor.id)));
        btns.appendChild(secondaryBtn('הוסף מס\' חדרים (Bulk)', ()=> promptBulkCreate('חדרים', floor.id, 'חדר', 'מספרי חדרים (לדוגמה: 101, 105, 201-204)', addRoomsBulk, 'text')));
        btns.appendChild(btn('ערוך קומה', 'warn', ()=> promptEditFloor(floor.id, floor.floor_number, floor.displayName)));
      } 
      
      else if (type === 'r') { // נבחר חדר
        const { building, floor, room } = findRoom(id);
        const floorName = floor.displayName || `קומה ${floor.floor_number}`;
        title.textContent = `נבחר: חדר ${room.room_number}`;
        details.textContent = `סוג: חדר (${floorName})`;
        btns.appendChild(primaryBtn('הוסף מיטה בודדת', ()=> promptAddBed(room.id)));
        btns.appendChild(secondaryBtn('הוסף מס\' מיטות (Bulk)', ()=> promptBulkCreate('מיטות', room.id, 'מיטה', 'מספרי מיטות (לדוגמה: 1-4, 6, 8)', addBedsBulk)));
        btns.appendChild(btn('ערוך מספר/שם חדר', 'warn', ()=> promptEditRoom(room.id, room.room_number)));
      } 
      
      else if (type === 'bed') { // נבחרה מיטה
        const { building, floor, room, bed } = findBed(id);
        const student = findStudent(bed.student_id);
        const floorName = floor.displayName || `קומה ${floor.floor_number}`;
        title.textContent = `נבחר: מיטה ${bed.bed_number}`;
        details.innerHTML = `סוג: מיטה<br>מיקום: ${building.name}, ${floorName}, חדר ${room.room_number}, מיטה ${bed.bed_number}`;
        
        if (student) { // אם המיטה תפוסה
          // שינוי (ג): הוספת שדה השיעור ומספר טלפון
          const className = student.className ? escapeHtml(student.className) : '—';
          const phone = student.phone ? escapeHtml(student.phone) : '—';
          details.innerHTML += `<br>משובץ: ${escapeHtml(student.firstName)} ${escapeHtml(student.lastName)}
                                <br>שיעור: ${className}
                                <br>טלפון: ${phone}`;
          
          // חדש: הצגת תגיות מעל פרטי הבחור
          const tagsHtml = (student.tags || []).map(tag => {
              let tagClass = '';
              let tagLabel = '';
              let dateInfo = '';
              
              if (tag === 'מאורס') {
                  tagClass = 'tag-maoras';
                  tagLabel = '💍 מאורס';
                  if (student.status_data.wedding_date) {
                    // שינוי: שימוש ב-toHebrewDate
                    dateInfo = ` (${toHebrewDate(student.status_data.wedding_date)})`;
                  }
              } else if (tag === 'חיזוק') {
                  tagClass = 'tag-hizuk';
                  tagLabel = '↩️ חיזוק';
                   if (student.status_data.return_date) {
                    // שינוי: שימוש ב-toHebrewDate
                    dateInfo = ` (חוזר: ${toHebrewDate(student.status_data.return_date)})`;
                  }
              } else {
                   tagLabel = tag;
              }

              return `<span class="chip ${tagClass}">${tagLabel}${dateInfo}</span>`;
          }).join('');

          if (tagsHtml) {
              details.innerHTML += `<div style="margin-top: 8px;">${tagsHtml}</div>`;
          }


          // שינוי: כפתור ביטול שיבוץ קורא ל-unassignBed
          btns.appendChild(primaryBtn('בטל שיבוץ', ()=> { unassignBed(bed.id); }));
          
          // שינוי (ד): הכפתור פותח מודאל עריכה ישירות
          btns.appendChild(btn('צפה/ערוך פרטי בחור', 'ghost', ()=> {
              selectedStudentId = student.id; // קבע את הבחור הנבחר
              promptEditSelectedStudent(); // פתח את מודאל העריכה
          }));
        }
        else { // אם המיטה פנויה
          btns.appendChild(primaryBtn('שבץ בחור', ()=> promptAssign(bed.id)));
        }
        btnDelete.disabled = false;

        // הוספה: הצג את היסטוריית המיטה
        historyContainer.classList.remove('hidden');
        renderBedHistory(bed, historyContainer);
      }
    }
    
    // פונקציות עזר ליצירת כפתורים
    function btn(label, cls, onClick) { const b = document.createElement('button'); b.className = `btn ${cls||''}`; b.textContent = label; b.onclick = onClick; return b; }
    function primaryBtn(label, onClick) { return btn(label, 'primary', onClick); }
    function secondaryBtn(label, onClick) { return btn(label, 'secondary', onClick); }

    /**
     * פונקציית הגיון ליצירת מבנה מלא (אוטומטי).
     */
    function addFullBuilding(name, numFloors, numRoomsPerFloor, numBedsPerRoom) {
        name = name.trim();
        if (!name) return [false, 'שם המבנה לא יכול להיות ריק.'];
        if (DB.buildings.some(b => b.name === name)) return [false, `מבנה בשם "${name}" כבר קיים.`];

        // ולידציה של מספרים
        const floors = Number(numFloors);
        const rooms = Number(numRoomsPerFloor);
        const beds = Number(numBedsPerRoom);
        if (!Number.isInteger(floors) || floors <= 0) return [false, 'מספר הקומות חייב להיות מספר שלם וחיובי.'];
        if (!Number.isInteger(rooms) || rooms <= 0) return [false, 'מספר החדרים בכל קומה חייב להיות מספר שלם וחיובי.'];
        if (!Number.isInteger(beds) || beds <= 0) return [false, 'מספר המיטות בכל חדר חייב להיות מספר שלם וחיובי.'];

        // יצירת האובייקט
        const newBuilding = { id: DB.seq.building++, name, floors: [], type: 'b' };

        for (let i = 1; i <= floors; i++) {
            const newFloor = { id: DB.seq.floor++, floor_number: i, displayName: ``, rooms: [], type: 'f' };
            for (let j = 1; j <= rooms; j++) {
                const roomNumber = `${i}${String(j).padStart(2, '0')}`; // מספור חדרים (למשל 101, 102)
                const newRoom = { id: DB.seq.room++, room_number: roomNumber, beds: [], type: 'r' };
                for (let k = 1; k <= beds; k++) {
                    // הוספה: אתחול היסטוריה
                    newRoom.beds.push({ id: DB.seq.bed++, bed_number: k, student_id: null, type: 'bed', history: [] });
                }
                newFloor.rooms.push(newRoom);
            }
            newBuilding.floors.push(newFloor);
        }

        DB.buildings.push(newBuilding);
        saveDB();
        return [true, `המבנה "${name}" נוצר בהצלחה עם ${floors} קומות, ${rooms} חדרים בכל קומה ו-${beds} מיטות בכל חדר.`];
    }

    /**
     * מציג מודאל "הוספת מבנה חדש (אוטומטי)".
     */
    function promptAddFullBuilding() {
        const modalHtml = `
            <div class="row"><label>שם המבנה (חובה):</label><input id="in-b-name" /></div>
            <div class="row-grid">

    /**
     * מציג מודאל לבחירת סוג איפוס נתונים.
     */
    function promptResetOptions() {
        const modalHtml = `
            <p><strong><i class="fas fa-exclamation-triangle"></i> אזהרה:</strong> פעולה זו הינה בלתי הפיכה. בחר את סוג האיפוס הרצוי:</p>
            <div style="display: grid; gap: 10px; margin-top: 15px;">
                <button class="btn danger" id="reset-option-structures">איפוס מבנים בלבד (קומות, חדרים, מיטות)</button>
                <button class="btn danger" id="reset-option-students">איפוס בחורים בלבד (ושיבוצים)</button>
                <button class="btn danger" id="reset-option-all">איפוס כללי (מחיקת הכל)</button>
            </div>
        `;
        showModal('איפוס נתונים', modalHtml, null, 'ביטול');
        
        el('#modal-ok').style.display = 'none'; // הסתר כפתור אישור

        // איפוס מבנים בלבד
        el('#reset-option-structures').onclick = async () => {
            if (await confirmDialog('האם אתה בטוח שברצונך לאפס את כל המבנים? כל הקומות, החדרים והמיטות ימחקו, וכל השיבוצים יבוטלו. רשימת הבחורים תישמר.')) {
                DB.buildings = [];
                DB.seq.building = 1; DB.seq.floor = 1; DB.seq.room = 1; DB.seq.bed = 1;
                saveDB();
                el('#modal-cancel').click();
            }
        };
        // איפוס בחורים בלבד
        el('#reset-option-students').onclick = async () => {
            if (await confirmDialog('האם אתה בטוח שברצונך לאפס את כל הבחורים? כל רשימת הבחורים תימחק וכל השיבוצים יבוטלו. מבנה הפנימייה יישמר.')) {
                DB.students = [];
                // אפס שיבוצים קיימים
                for (const b of DB.buildings) for (const f of b.floors) for (const r of b.rooms) {
                    for (const bed of r.beds) {
                        bed.student_id = null;
                        bed.history = []; // הוספה: אפס היסטוריה
                    }
                }
                saveDB();
                el('#modal-cancel').click();
            }
        };
        // איפוס כללי
        el('#reset-option-all').onclick = async () => {
            if (await confirmDialog('האם אתה בטוח שברצונך לאפס את כל נתוני המערכת? **כל המבנים וכל הבחורים יימחקו לצמיתות!**')) {
                DB = { seq: {building:1, floor:1, room:1, bed:1, student:1}, buildings: [], students: [] }; // החלף ב-DB ריק
                selectedNode = null;
                selectedStudentId = null;
                saveDB();
                el('#modal-cancel').click();
            }
        };
    }

    //   מודאלים ספציפיים (הוספה, עריכה, שיבוץ)
    // --------------------------------------------------
    
    function promptAddFloor(buildingId) {

    /**
     * מודאל גנרי להוספה מרובה (Bulk).
     */
    function promptBulkCreate(type, parentId, itemLabel, inputPlaceholder, logicFn, inputType='text') {
        const title = `הוספת ${type} מרובים`;
        showModal(title, `
            <div class="row">
                <label>${inputPlaceholder}</label>
                <input id="in-bulk-items" type="${inputType}" placeholder="${inputPlaceholder}" />
                <div class="muted" style="margin-top: 5px;">הפרד עם פסיקים או השתמש בטווחים (למשל: 1-4, 6)</div>
            </div>
        `,
        ()=>{
            const input = el('#in-bulk-items').value;
            if (!input.trim()) { errorDialog('הקלט ריק.'); return; }
            const results = logicFn(parentId, input); // קרא לפונקציית הלוגיקה
            // הצג סיכום
            let summary = `נוספו בהצלחה ${results.added} ${type}.`;
            if (results.failed.length > 0) {
                summary += `<br><br><strong>${results.failed.length} ${itemLabel} נכשלו (קיימים או קלט לא חוקי):</strong><br>${results.failed.slice(0, 5).join(', ')}${results.failed.length > 5 ? '...' : ''}`;
            }
            showModal('סיכום הוספה', `<div class="row">${summary}</div>`, null, 'סגור');

        }, ()=>{});
        el('#in-bulk-items').focus();
    }

    /**
     * מודאל קלט גנרי (שדה אחד).
     */
    function promptInput(title, label, defaultValue, onOk, inputId, inputType='text') {
        showModal(title, `
            <div class="row">
                <label>${label}</label>
                <input id="${inputId}" type="${inputType}" value="${escapeHtml(defaultValue)}" />

    /**
     * מודאל לשיבוץ בחור במיטה.
     */
    function promptAssign(bedId) {
      const allUnassigned = getUnassignedStudents(); // קבל רשימת בחורים פנויים
      
      // 1. קבל את רשימת השיעורים הייחודית לסינון
      const uniqueClasses = Array.from(new Set(allUnassigned.map(s => s.className).filter(c => c))).sort();
      const classOptions = uniqueClasses.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

      // 2. HTML חדש הכולל סרגל כלים לחיפוש וסינון
      const modalHtml = `
        <div class="assign-toolbar">
            <select id="sel-class" class="assign-select">
                <option value="">(כל השיעורים)</option>
                ${classOptions}
            </select>
            <input id="search-student-assign" class="assign-search" placeholder="חפש שם בחור..." />
        </div>
        <div class="row assign-list-container">
          <label>בחר בחור:</label>
          <select id="sel-student" class="assign-list" size="10"></select>
        </div>
      `;
      
      // פונקציית עזר לרינדור רשימת ה-select (תוך כדי סינון)
      const updateStudentList = () => {
          const selectEl = el('#sel-student');
          const filterText = el('#search-student-assign').value.toLowerCase();
          const filterClass = el('#sel-class').value;
          
          // סנן את רשימת הבחורים
          const filteredStudents = allUnassigned.filter(s => {
              const fullName = `${s.firstName} ${s.lastName}`.toLowerCase();
              const classMatch = !filterClass || s.className === filterClass;
              const textMatch = !filterText || fullName.includes(filterText) || (s.id && s.id.includes(filterText));
              return classMatch && textMatch;
          }).sort((a,b)=>`${a.lastName} ${a.firstName}`.localeCompare(`${b.lastName} ${b.firstName}`, 'he'));

          // בנה את האפשרויות מחדש
          selectEl.innerHTML = filteredStudents.map(s => {
              const className = s.className ? ` (שיעור: ${escapeHtml(s.className)})` : '';
              return `<option value="${s.id}">${escapeHtml(s.lastName)} ${escapeHtml(s.firstName)}${className}</option>`
          }).join('');

          // בחר את הראשון אם יש רשימה
          if (selectEl.options.length > 0) {
              selectEl.options[0].selected = true;
          }
      };


      // הצגת המודאל
      showModal('שיבוץ בחור', modalHtml,
      ()=>{
        const sid = el('#sel-student').value;
        if (!sid) {
            errorDialog('יש לבחור בחור מהרשימה כדי לבצע שיבוץ.');
            return;
        }
        assignStudentToBed(bedId, sid); // בצע שיבוץ
      }, ()=>{});
      
      // הוספת מאזינים לאחר שהמודאל נטען
      el('#search-student-assign').addEventListener('input', updateStudentList);
      el('#sel-class').addEventListener('change', updateStudentList);

      // רינדור ראשוני של הרשימה
      updateStudentList();
      el('#search-student-assign').focus(); // הגדר פוקוס על שדה החיפוש
    }

    // ==================================================
    //       פרק 11: לוגיקת ממשק - טבלת בחורים
    // ==================================================
    
    const tblBody = el('#tbl-students tbody'); // שמירת מצביע לגוף הטבלה
    let selectedStudentId = null; // משתנה גלובלי לבחור הנבחר

    /**
     * מרנדר את טבלת הבחורים, כולל סינון.
     * @param {string} filter - מחרוזת החיפוש
     */
    function renderStudents(filter='') {
      const q = filter.trim().toLowerCase(); // הכן את מחרוזת החיפוש
      
      // סנן את רשימת הבחורים
      // שינוי: הרחבת החיפוש לשדות החדשים
      const list = DB.students
        .filter(s => !q || 
          s.id.includes(q) || // חפש במזהה הראשי (ת.ז או דרכון)
          s.firstName.toLowerCase().includes(q) || 
          s.lastName.toLowerCase().includes(q) || 
          (s.className && s.className.toLowerCase().includes(q)) || // חיפוש בכיתה
          (s.city && s.city.toLowerCase().includes(q)) // חיפוש בישוב
        )
        .sort((a,b)=>`${a.lastName} ${a.firstName}`.localeCompare(`${b.lastName} ${b.firstName}`, 'he')); // מיין לפי א"ב

      // קבל רשימת מזהים של לא משובצים (לצורך יעילות)
      const unassignedIds = new Set(getUnassignedStudents().map(s=>s.id));

      tblBody.innerHTML = ''; // נקה טבלה
      
      // אפס כפתורים
      els('#tbl-students tbody tr').forEach(r => r.classList.remove('selected'));
      el('#btn-edit-student').disabled = true;
      el('#btn-del-student').disabled = true;

      // בנה את שורות הטבלה
      for (const s of list) {
        const tr = document.createElement('tr');
        tr.dataset.id = s.id;
        
        const isAssigned = !unassignedIds.has(s.id);
        let locationText = '—';

        if (isAssigned) {
            const loc = getStudentBed(s.id); // מצא מיקום
            if (loc) {
                const floorName = loc.floor.displayName || `קומה ${loc.floor.floor_number}`;
                locationText = `${loc.building.name}, ${floorName}, חדר ${loc.room.room_number}, מיטה ${loc.bed.bed_number}`;
            }
        }

        // חדש: יצירת תא סטטוס עם התגיות
        let statusCellContent = '';
        if (s.tags && s.tags.length > 0) {
            const tagsHtml = s.tags.map(tag => {
                let tagClass = '';
                let tagLabel = '';
                let dateInfo = '';
                
                if (tag === 'מאורס') {
                    tagClass = 'tag-maoras';
                    tagLabel = '💍 מאורס';
                    if (s.status_data.wedding_date) {
                        // שינוי: שימוש ב-toHebrewDate
                        dateInfo = ` (${toHebrewDate(s.status_data.wedding_date)})`;
                    }
                } else if (tag === 'חיזוק') {
                    tagClass = 'tag-hizuk';
                    tagLabel = '↩️ חיזוק';
                     if (s.status_data.return_date) {
                        // שינוי: שימוש ב-toHebrewDate
                        dateInfo = ` (חוזר: ${toHebrewDate(s.status_data.return_date)})`;
                    }
                } else {
                    tagLabel = tag;
                }
                
                return `<span class="chip ${tagClass}">${tagLabel}${dateInfo}</span>`;
            }).join('');
            // --- *** תיקון: עטיפת התגיות ב-div *** ---
            statusCellContent = `<div style="display: flex; flex-wrap: wrap; gap: 0; margin: -5px 0 -5px -5px;">${tagsHtml}</div>`;
        }


        // שינוי: התאמת השדות בטבלה למבנה החדש (הוספת עמודת סטטוס)
        tr.innerHTML = `
          <td title="${escapeHtml(s.lastName)}">${escapeHtml(s.lastName)}</td>
          <td title="${escapeHtml(s.firstName)}">${escapeHtml(s.firstName)}</td>
          <td class="status-cell" title="${s.tags && s.tags.length > 0 ? 'סטטוס מיוחד' : '—'}">${statusCellContent}</td>
          <td title="${escapeHtml(s.id)}">${escapeHtml(s.id)}</td>
          <td title="${escapeHtml(s.className || '—')}">${escapeHtml(s.className || '—')}</td>
          <td title="${escapeHtml(s.city || '—')}">${escapeHtml(s.city || '—')}</td>
          <td title="${escapeHtml(s.phone || '—')}">${escapeHtml(s.phone || '—')}</td>
          <td title="${locationText}">${locationText}</td>
        `;
        
        // הוסף מאזין לבחירת שורה
        // --- *** שינוי (א) *** ---
        // שינוי: לחיצה בודדת רק בוחרת
        tr.addEventListener('click', ()=> selectStudent(s.id, tr));
        // שינוי: לחיצה כפולה פותחת עריכה
        tr.addEventListener('dblclick', ()=> promptEditSelectedStudent());
        // --- *** סוף התיקון *** ---
        tblBody.appendChild(tr);

        // אם הבחור הזה הוא הנבחר, סמן אותו
        if (selectedStudentId === s.id) tr.classList.add('selected');
      }
    }

    /**
     * מסמן בחור כנבחר בטבלה.
     * @param {string} id - מזהה הבחור
     * @param {HTMLElement | null} elem - השורה שנלחצה (אופציונלי)
     */
    function selectStudent(id, elem=null) {
        selectedStudentId = id;
        
        // הסר סימון מכל השורות
        els('#tbl-students tbody tr').forEach(r=> r.classList.remove('selected'));
        
        // סמן את השורה
        if (elem) {
            elem.classList.add('selected');
        } else {
            // אם האלמנט לא סופק, חפש אותו
            const tr = el(`tr[data-id="${id}"]`, tblBody);
            if (tr) tr.classList.add('selected');
        }
        
        // אפשר את כפתורי העריכה/מחיקה
        el('#btn-edit-student').disabled = false;
        el('#btn-del-student').disabled = false;
    }

    // --------------------------------------------------
    //   מאזינים לכפתורי מסך "ניהול בחורים"
    // --------------------------------------------------

    // חיפוש
    el('#search-student').addEventListener('input', e => renderStudents(e.target.value));

    // שינוי: מודאל הוספת בחור חדש
    el('#btn-add-student').addEventListener('click', ()=>{
      showModal('הוספת בחור חדש', `
        <div class="row-grid">
            <div class="row"><label>שם משפחה (חובה):</label><input id="in-st-ln" /></div>
            <div class="row"><label>שם פרטי (חובה):</label><input id="in-st-fn" /></div>
        </div>
        <div class="row-grid-3">
            <div class="row"><label>תעודת זהות:</label><input id="in-st-id-card" /></div>
            <div class="row"><label>מס דרכון:</label><input id="in-st-passport" /></div>
            <div class="row"><label>גיל:</label><input id="in-st-age" type="number" /></div>
        </div>
        <div class="row-grid">
            <div class="row"><label>כיתה:</label><input id="in-st-classname" /></div>
            <div class="row"><label>קבוצה (גל):</label><input id="in-st-groupname" /></div>
        </div>
        <hr style="border:0; border-top: 1px solid var(--border); margin: 10px 0;">
        <div class="row-grid-3">
            <div class="row"><label>ישוב:</label><input id="in-st-city" /></div>
            <div class="row"><label>רחוב:</label><input id="in-st-street" /></div>
            <div class="row"><label>מספר בית/דירה:</label><input id="in-st-housenum" /></div>
        </div>
        <div class="row"><label>נייד תלמיד:</label><input id="in-st-phone" type="tel" /></div>
        <div class="row" style="margin-top: 5px;"><small class="muted">חובה למלא לפחות אחד מהשדות: תעודת זהות או מס דרכון.</small></div>
      `,
      ()=>{
        // אסוף את כל הנתונים מהטופס
        const studentData = {
          lastName: el('#in-st-ln').value,
          firstName: el('#in-st-fn').value,
          id_card: el('#in-st-id-card').value, // שדה ת.ז
          passport: el('#in-st-passport').value, // שדה דרכון
          age: el('#in-st-age').value,
          className: el('#in-st-classname').value,
          groupName: el('#in-st-groupname').value,
          street: el('#in-st-street').value,
          houseNum: el('#in-st-housenum').value,
          city: el('#in-st-city').value,
          phone: el('#in-st-phone').value
        };
        const [ok, msg] = addStudent(studentData); // קרא ללוגיקת ההוספה
        if (!ok) errorDialog(msg);
      }, ()=>{});
      el('#in-st-ln').focus();
    });

    // --- *** שינוי (א) *** ---
    // נמחקה הפונקציה selectAndShowEditModal
    // --- *** סוף התיקון *** ---

    /**
     * פונקציה להצגת שדות התאריך בהתאם לתגיות הנבחרות.
     */
    function updateTagDatesUI(s) {
        const selectedTags = els('.tag-checkbox:checked').map(cb => cb.value);
        const datesContainer = el('#tag-dates-container');
        datesContainer.innerHTML = '';
        
        let datesHtml = '';
        
        if (selectedTags.includes('מאורס')) {
            datesHtml += `
                <div class="row">
                    <label>תאריך חתונה (לצורך פינוי מיטה):</label>
                    <input id="in-wedding-date" type="date" value="${toHtmlDate(s.status_data.wedding_date)}" />
                </div>
            `;
        }
        if (selectedTags.includes('חיזוק')) {
            datesHtml += `
                <div class="row">
                    <label>תאריך חזרה מחיזוק (לתפוס מיטה חזרה):</label>
                    <input id="in-return-date" type="date" value="${toHtmlDate(s.status_data.return_date)}" />
                </div>
            `;
        }
        
        if (datesHtml) {
            datesContainer.innerHTML = `<h5 style="margin-bottom: 5px; font-weight: 700; color: var(--accent-2);">הגדרות תאריך מיוחדות</h5>` + datesHtml;
        }
    }


    /**
     * הוספה: פונקציה שמכילה את הלוגיקה לפתיחת מודאל עריכה.
     * פונקציה זו נקראת גם על ידי לחיצה כפולה על שורה וגם על ידי הכפתור "ערוך פרטים".
     */
    function promptEditSelectedStudent() {
      if (!selectedStudentId) { errorDialog('יש לבחור בחור מהרשימה תחילה.'); return; }
      const s = findStudent(selectedStudentId);
      if (!s) return;
      
      const ALL_TAGS = ['מאורס', 'חיזוק', 'ועד', 'מנהל'];
      const currentTags = s.tags || [];

      const tagsHtml = ALL_TAGS.map(tag => {
        const isChecked = currentTags.includes(tag);
        const tagClass = isChecked ? `chip tag-${tag.toLowerCase()}` : 'chip';
        return `
            <label class="${tagClass}" style="cursor: pointer; user-select: none;">
                <input type="checkbox" class="tag-checkbox" value="${tag}" ${isChecked ? 'checked' : ''} style="margin-left: 5px;" />
                ${tag}
            </label>
        `;
      }).join('');
      
      // מבנה ה-HTML של המודאל
      const modalHtml = `
        <div class="row"><label>מזהה ראשי (ת.ז או דרכון):</label><input value="${escapeHtml(s.id)}" disabled /></div>
        <div class="row-grid">
            <div class="row"><label>שם משפחה (חובה):</label><input id="in-st-ln" value="${escapeHtml(s.lastName || '')}" /></div>
            <div class="row"><label>שם פרטי (חובה):</label><input id="in-st-fn" value="${escapeHtml(s.firstName || '')}" /></div>
        </div>
        <div class="row-grid-3">
            <div class="row"><label>תעודת זהות:</label><input id="in-st-id-card" value="${escapeHtml(s.id_card || '')}" /></div>
            <div class="row"><label>מס דרכון:</label><input id="in-st-passport" value="${escapeHtml(s.passport || '')}" /></div>
            <div class="row"><label>גיל:</label><input id="in-st-age" type="number" value="${escapeHtml(s.age || '')}" /></div>
        </div>
        <div class="row-grid">
            <div class="row"><label>כיתה:</label><input id="in-st-classname" value="${escapeHtml(s.className || '')}" /></div>
            <div class="row"><label>קבוצה (גל):</label><input id="in-st-groupname" value="${escapeHtml(s.groupName || '')}" /></div>
        </div>
        <hr style="border:0; border-top: 1px solid var(--border); margin: 10px 0;">
        
        <!-- חדש: סעיף תגיות -->
        <div class="row">
            <label style="font-weight: 700;">תגיות וסטטוסים מיוחדים:</label>
            <div id="tags-selector" style="display: flex; flex-wrap: wrap; gap: 8px;">
                ${tagsHtml}
            </div>
        </div>
        <div id="tag-dates-container" class="row">
            <!-- יטען באופן דינמי על ידי JS -->
        </div>
        <!-- סוף סעיף תגיות -->

        <hr style="border:0; border-top: 1px solid var(--border); margin: 10px 0;">
        <div class="row-grid-3">
            <div class="row"><label>ישוב:</label><input id="in-st-city" value="${escapeHtml(s.city || '')}" /></div>
            <div class="row"><label>רחוב:</label><input id="in-st-street" value="${escapeHtml(s.street || '')}" /></div>
            <div class="row"><label>מספר בית/דירה:</label><input id="in-st-housenum" value="${escapeHtml(s.houseNum || '')}" /></div>
        </div>
        <div class="row"><label>נייד תלמיד:</label><input id="in-st-phone" type="tel" value="${escapeHtml(s.phone || '')}" /></div>
        <div class="row" style="margin-top: 5px;"><small class="muted">לא ניתן לשנות את המזהה הראשי. ניתן לעדכן את שדות הת.ז/דרכון המקוריים.</small></div>
      `;
      
      showModal('עריכת פרטי בחור', modalHtml,
      ()=>{
        // 1. קבץ את התגיות הנבחרות
        const selectedTags = els('#tags-selector .tag-checkbox:checked').map(cb => cb.value);
        
        // 2. קבץ את נתוני הסטטוס (תאריכים)
        const statusData = {};
        if (selectedTags.includes('מאורס')) {
            statusData.wedding_date = el('#in-wedding-date') ? el('#in-wedding-date').value : '';
        }
        if (selectedTags.includes('חיזוק')) {
            statusData.return_date = el('#in-return-date') ? el('#in-return-date').value : '';
        }

        // 3. אסוף את כל הנתונים מהטופס
        const studentData = {
          lastName: el('#in-st-ln').value,
          firstName: el('#in-st-fn').value,
          id_card: el('#in-st-id-card').value, // עדכון שדה ת.ז
          passport: el('#in-st-passport').value, // עדכון שדה דרכון
          age: el('#in-st-age').value,
          className: el('#in-st-classname').value,
          groupName: el('#in-st-groupname').value,
          street: el('#in-st-street').value,
          houseNum: el('#in-st-housenum').value,
          city: el('#in-st-city').value,
          phone: el('#in-st-phone').value,
          tags: selectedTags, // חדש
          status_data: statusData // חדש
        };
        const [ok, msg] = updateStudent(s.id, studentData); // קרא ללוגיקת העדכון
        if (!ok) errorDialog(msg);
      }, ()=>{});
      
      // חבר מאזינים לשינוי תגיות לאחר שהמודאל נטען
      els('.tag-checkbox').forEach(cb => {
          cb.addEventListener('change', () => updateTagDatesUI(s));
      });
      
      // רינדור ראשוני של שדות התאריך
      updateTagDatesUI(s);
      el('#in-st-ln').focus();
    }

    // שינוי: כפתור עריכה קורא לפונקציה החדשה
    el('#btn-edit-student').addEventListener('click', promptEditSelectedStudent);


    // מחיקת בחור נבחר
    el('#btn-del-student').addEventListener('click', async ()=>{
      if (!selectedStudentId) { errorDialog('יש לבחור בחור מהרשימה תחילה.'); return; }
      if (!(await confirmDialog('האם אתה בטוח? פעולה זו תסיר את הבחור ותפנה את מיטתו אם משובץ.'))) return;
      
      deleteStudent(selectedStudentId);
      selectedStudentId = null; // אפס בחירה
    });

    // ==================================================
    //            פרק 12: פונקציות מערכת כלליות
    // ==================================================

    /**
     * מעדכן את כל הסטטיסטיקות בראש העמוד (מסך ניהול).
     */
    function updateStats() {
      const totalStudents = DB.students.length;
      const unassignedStudents = getUnassignedStudents().length;
      
      let totalBeds = 0, assigned = 0;
      // --- התיקון כאן ---
      // הוספנו בדיקות (|| []) כדי למנוע קריסה אם המערכים ריקים או חסרים
      for (const b of (DB.buildings || [])) for (const f of (b.floors || [])) for (const r of (f.rooms || [])) {
        totalBeds += (r.beds || []).length;
        for (const bed of (r.beds || [])) if (bed.student_id) assigned++;
      }
      // --- סוף התיקון ---
      const freeBeds = totalBeds - assigned;
      
      // עדכן את ה-HTML
      el('#stat-students').textContent = `בחורים: ${totalStudents}`;
      el('#stat-unassigned').textContent = `לא משובצים: ${unassignedStudents}`;
      el('#stat-assigned').textContent = `משובצים: ${assigned}`;
      el('#stat-beds-free').textContent = `מיטות פנויות: ${freeBeds}`;
    }

    /**
     * פונקציית רענון מרכזית.
     * קוראת לכל פונקציות הרינדור והעדכון הנדרשות.
     * @param {number|null} [scrollToId=null] - מזהה פריט (כגון מיטה) שיש לגלול אליו לאחר הרענון.
     */
    function refreshAll(scrollToId = null) {
      // חדש: קבל את מחרוזת החיפוש של החדרים
      const roomFilter = el('#search-rooms') ? el('#search-rooms').value : '';
      renderTree(roomFilter); // רנדר עץ עם פילטר
      renderStudents(el('#search-student').value || ''); // רנדר טבלת בחורים (עם פילטר קיים)
      updateActionsPanel(); // עדכן פאנל פעולות (למקרה שהבחירה אופסה)

      // חדש: לוגיקת גלילה
      if (scrollToId) {
        setTimeout(() => {
          const targetEl = el(`.bed-cell[data-id="${scrollToId}"]`);
          if (targetEl) {
            // גלילה לתוך הקונטיינר של העץ
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 50);
      }
    }

    // ==================================================
    //            פרק 13: הפעלה ראשונית ומאזינים גלובליים
    // ==================================================

    // קריאה ראשונית לרינדור הכל בעליית הדף
    refreshAll();

    // מאזין גלובלי למקשים (למשל, מקש Delete למחיקה מהירה)
    document.addEventListener('keydown', (e)=>{
      // אל תפעל אם הפוקוס בתוך שדה קלט
      if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        // אם נלחץ Delete ויש פריט נבחר בעץ (והמודאל לא פתוח)
        if (e.key === 'Delete' && selectedNode && el('#modal-backdrop').classList.contains('hidden')) { // תיקון: בדיקה שהמודאל סגור
          el('#btn-delete').click();
        }
        // אם נלחץ Delete ויש בחור נבחר (והמודאל לא פתוח)
        else if (e.key === 'Delete' && selectedStudentId && el('#modal-backdrop').classList.contains('hidden')) { // תיקון: בדיקה שהמודאל סגור
          el('#btn-del-student').click();
        }
      }
    });

  </script>
</body>
</html>
